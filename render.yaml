services:
  # ---- Backend: Spring Boot API (Docker web service) ----
  - type: web
    name: expense-tracker-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # e.g. jdbc:mysql://<host>:3306/expense_tracker?useSSL=true&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false # e.g. https://expense-tracker-frontend.onrender.com
    healthCheckPath: /api/health

  # ---- Frontend: React (Vite) static site ----
  - type: web
    name: expense-tracker-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false # e.g. https://expense-tracker-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
